name: Deploy HTML5 game to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Only one Pages deployment should run at a time per branch.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # Pull the repository contents that include index.html, styles.css, game.js and assets/.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configure the Pages deployment workflow internals.
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # Upload the whole static site as the Pages artifact.
      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # Deploy the uploaded artifact to GitHub Pages.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
